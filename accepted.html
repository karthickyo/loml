.side-gif{
    position: fixed;

    z-index: 1;
    animation: floaty 3s ease-in-out infinite;
}
.left-gif{
    left: 30px;
    top: 50%;
}
.right-gif{
    right: 30px;
    top: 50%;
}
@keyframes floaty{
    0%{
        transform: translateY(-50%) translateY(0px);
    }

    50%{
        transform: translateY(-50%) translateY(-15px);
    }

    100%{
        transform: translateY(-50%) translateY(0px);
    }
}
